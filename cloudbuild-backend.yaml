steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/wally-registry-500519/wally-registry-backend:$COMMIT_SHA', '-f', 'wally-registry-backend/Dockerfile', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/wally-registry-500519/wally-registry-backend:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "deploy",
        "wally-registry-backend",
        "--image",
        "gcr.io/wally-registry-500519/wally-registry-backend:$COMMIT_SHA",
        "--region",
        "us-central1",
        "--platform",
        "managed",
        "--command",
        "./launch",
        "--port",
        "8000",
        "--set-secrets",
        "WALLY_github_token=WALLY_GITHUB_TOKEN:latest,WALLY_auth=WALLY_ROCKET_AUTH:latest,/secrets/SERVICE_ACCOUNT=WALLY_SERVICE_ACCOUNT:latest",
        "--set-env-vars",
        '^@^GOOGLE_APPLICATION_CREDENTIALS=/secrets/SERVICE_ACCOUNT@WALLY_storage={type: "gcs", bucket: "curvy-backstab-numbness-obligate"}@WALLY_INDEX_URL="https://github.com/Amero-EOF/wally-index"',
        "--allow-unauthenticated",
      ]

timeout: 900s
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
